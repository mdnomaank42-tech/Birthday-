<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Qudrath</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.stars{
position:absolute;
width:100%;
height:100%;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

.card{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:20px;
z-index:2;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d79;
color:white;
cursor:pointer;
}

#message{
margin-top:20px;
font-size:20px;
display:none;
white-space:pre-line;
}

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

#heartbeat{
font-size:80px;
display:none;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

#final{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#ff4d79;
display:none;
text-shadow:0 0 10px #ff4d79,
0 0 20px #ff4d79,
0 0 40px #ff4d79,
0 0 80px #ff4d79;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff4d79}
to{text-shadow:0 0 50px #ff4d79}
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="card">

<h1>🎂 Happy Birthday Qudrath Unnisa 🎂</h1>

<p>Click my heart ❤️</p>

<button onclick="startLove()">❤️ Click My Heart ❤️</button>

<div id="heartbeat">❤️</div>

<div id="message"></div>

</div>

<div id="final">I LOVE YOU QUDRATH ❤️</div>

<audio id="music">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b7c6b8e7.mp3">
</audio>

<script>

const text = `Dear Qudrath,

You are one of the most beautiful
and special people in my life.

Your smile makes my world brighter,
and your presence makes my days happier.

On your birthday I wish you
endless happiness and success.

No matter what happens,
you will always be very special to me.

With love,
Nomaan Khan ❤️`;

function startLove(){

document.getElementById("music").play();
document.getElementById("heartbeat").style.display="block";

const msg=document.getElementById("message");
msg.style.display="block";

let i=0;

function typing(){
if(i<text.length){
msg.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}else{
setTimeout(showFinal,4000);
}
}

typing();
}

function showFinal(){

document.querySelector(".card").style.display="none";
document.getElementById("final").style.display="block";

}

function createStars(){

const stars=document.getElementById("stars");

for(let i=0;i<120;i++){

let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";

stars.appendChild(star);

}

}

createStars();

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
