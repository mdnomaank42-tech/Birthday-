<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Qudrath</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
text-align:center;
}

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hidden{display:none;}

.star{
position:absolute;
width:2px;
height:2px;ackground:white;
animation:twinkle 2s infinite alternate;
cursor:pointer;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d79;
color:white;
cursor:pointer;
}

#letter{
max-width:420px;
font-size:20px;
white-space:pre-line;
line-height:1.6;
}

#heartScene{
font-size:70px;
position:relative;
}

#h1,#h2{
position:absolute;
transition:3s;
}

#h1{left:-200px;}
#h2{right:-200px;}

#final{
font-size:60px;
color:#ff4d79;
text-shadow:0 0 20px #ff4d79,0 0 40px #ff4d79,0 0 80px #ff4d79;
}

.fire{
position:absolute;
width:4px;
height:4px;
background:white;
animation:explode 1.5s linear forwards;
}

@keyframes explode{
0%{transform:scale(1)}
100%{transform:scale(10);opacity:0}
}

#secret{
position:absolute;
bottom:50px;
font-size:22px;
color:#ffd1dc;
display:none;
}

</style>
</head>

<body>

<!-- Scene 1 -->
<div id="scene1" class="scene">
<h1>🎂 Happy Birthday Qudrath Unnisa 🎂</h1>
<p>Tap my heart ❤️</p>
<button onclick="startStory()">❤️ Click My Heart ❤️</button>
</div>

<!-- Scene 2 -->
<div id="scene2" class="scene hidden">
<div id="letter"></div>
</div>

<!-- Scene 3 -->
<div id="scene3" class="scene hidden">
<h2>Look at the stars closely…</h2>
</div>

<!-- Scene 4 -->
<div id="scene4" class="scene hidden">
<div id="heartScene">
<span id="h1">❤️</span>
<span id="h2">❤️</span>
</div>
</div>

<!-- Scene 5 -->
<div id="scene5" class="scene hidden">
<div id="final">I LOVE YOU QUDRATH ❤️<br>
<span style="font-size:25px">– Nomaan Khan</span>
</div>

<div id="secret">✨ You discovered my secret message… You are very special to me ✨</div>
</div>

<audio id="music">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b7c6b8e7.mp3">
</audio>

<script>

function createStars(){
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

s.onclick=function(){
document.getElementById("secret").style.display="block";
}

document.body.appendChild(s);
}
}

createStars();

const text=`Dear Qudrath,

Among all the stars in the sky,
you shine the brightest in my life.

Your smile makes my days happier
and your presence makes my world beautiful.

On your birthday I wish you
happiness, success and endless beautiful moments.

With love,
Nomaan Khan ❤️`;

function startStory(){

document.getElementById("music").play();

document.getElementById("scene1").classList.add("hidden");
document.getElementById("scene2").classList.remove("hidden");

let i=0;

function type(){
if(i<text.length){
document.getElementById("letter").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}else{
setTimeout(showConstellation,4000);
}
}

type();
}

function showConstellation(){

document.getElementById("scene2").classList.add("hidden");
document.getElementById("scene3").classList.remove("hidden");

const name="QUDRATH";

for(let i=0;i<name.length;i++){

let star=document.createElement("div");
star.className="star";
star.style.left=(200+i*40)+"px";
star.style.top="40vh";
star.style.transform="scale(3)";
document.body.appendChild(star);
}

setTimeout(joinHearts,4000);
}

function joinHearts(){

document.getElementById("scene3").classList.add("hidden");
document.getElementById("scene4").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("h1").style.left="0px";
document.getElementById("h2").style.right="0px";
},100);

setTimeout(showFinal,3500);
}

function showFinal(){

document.getElementById("scene4").classList.add("hidden");
document.getElementById("scene5").classList.remove("hidden");

fireworks();
}

function fireworks(){

for(let i=0;i<40;i++){

let f=document.createElement("div");
f.className="fire";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";

document.body.appendChild(f);

setTimeout(()=>f.remove(),1500);
}

setTimeout(fireworks,2000);
}

</script>

</body>
</html>
